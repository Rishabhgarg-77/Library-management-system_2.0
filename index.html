}
header {
    background: #34495e;
    padding: 1rem;

}
nav a {
    margin: 0 1rem;
    color: #ecf0f1;
    text-decoration: none;
}
main {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 1rem;
}
